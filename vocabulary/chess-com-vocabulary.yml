protocols:
  format: JSON-LD
  caching:
    - ETag
    - Last-Modified
    - max-age (12-24h typical)
  encoding:
    - gzip
  callback:
    - JSONP via `?callback=`

responseCodes:
  - 200
  - 301
  - 304
  - 404
  - 410
  - 429

authentication: none

operationalGuidance:
  - Send a User-Agent header containing a contact email or URL to avoid being blocked.
  - Prefer serial requests; parallel callers will receive 429 responses.
  - Cache aggressively using ETag and Last-Modified; data refreshes at most every 12-24 hours.
